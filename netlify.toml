[build]
  command = "pnpm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."cto-monitor"]
  schedule = "*/10 * * * *"

[functions."google-index-monitor"]
  schedule = "0 2 * * *"

# General app-shell HTML caching: allow short CDN revalidation while requiring freshness checks.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=300, stale-while-revalidate=60, must-revalidate"

# Vite content-hashed assets can be cached long-term because filenames change on rebuild.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Dynamic dashboard API responses must never be stored by browsers, Netlify CDN, or Cloudflare.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/api/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200

[[redirects]]
  from = "/api/trpc"
  to = "/.netlify/functions/trpc"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
